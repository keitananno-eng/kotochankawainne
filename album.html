<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Our Memories Album</title>
    <link rel="stylesheet" href="album.css">
</head>
<body>

    <header>
        <a href="itinerary.html" class="back-btn">‹ しおりへ戻る</a>
        <h1>Memories</h1>
    </header>

    <div class="container">
        <div class="slider-container">
            <div class="slider-wrapper" id="slider-wrapper">
                <div class="slide">
                    <img src="photo1.jpg" alt="旅行の写真1">
                </div>
                <div class="slide">
                    <img src="photo2.jpg" alt="旅行の写真2">
                </div>
                <div class="slide">
                    <img src="photo3.jpg" alt="旅行の写真3">
                </div>
                </div>

            <button class="prev-btn" id="prev-btn">‹</button>
            <button class="next-btn" id="next-btn">›</button>

            <div class="dots-container" id="dots-container"></div>
        </div>

        <div class="album-message">
            <p>旅行の思い出ここにあげようかな<br></p>
        </div>
    </div>

    <script src="album.js"></script>
